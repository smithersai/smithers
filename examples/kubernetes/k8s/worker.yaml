apiVersion: apps/v1
kind: Deployment
metadata:
  name: smithers-worker
  namespace: smithers-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: smithers-worker
  template:
    metadata:
      labels:
        app: smithers-worker
    spec:
      containers:
        - name: worker
          image: smithers-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: rpc
              containerPort: 3002
          env:
            - name: SMITHERS_ROLE
              value: worker
            - name: SMITHERS_ORCHESTRATOR_URL
              value: http://smithers-orchestrator.smithers-system.svc.cluster.local:3001
          envFrom:
            - secretRef:
                name: smithers-api-keys
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: smithers-worker
  namespace: smithers-system
spec:
  selector:
    app: smithers-worker
  ports:
    - port: 3002
      targetPort: 3002
